<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">

  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0bbcd6"/>
      <stop offset="40%" stop-color="#6a1b9a"/>
      <stop offset="70%" stop-color="#d81b60"/>
      <stop offset="100%" stop-color="#ff7043"/>
    </linearGradient>
  </defs>

  <!-- Abstract Triangle Base -->
  <polygon points="60,230 150,70 240,230"
           fill="none"
           stroke="url(#grad1)"
           stroke-width="18"
           stroke-linejoin="round"/>

  <!-- S Shape -->
  <path d="M110 200
           C80 170, 80 140, 120 120
           C170 95, 170 60, 130 40
           C100 25, 70 35, 55 55"
        fill="none"
        stroke="url(#grad1)"
        stroke-width="18"
        stroke-linecap="round"/>

  <!-- Wing Shape -->
  <path d="M170 90
           C240 80, 260 50, 290 40
           C270 80, 250 110, 200 120"
        fill="none"
        stroke="url(#grad1)"
        stroke-width="18"
        stroke-linecap="round"/>

  <!-- Brand Name -->
  <text x="330" y="175"
        font-family="Arial, Helvetica, sans-serif"
        font-size="80"
        font-weight="700"
        fill="currentColor">
        SAMITHA
  </text>

</svg>
