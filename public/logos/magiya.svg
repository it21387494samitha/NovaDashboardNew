<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- No Background Rect (Transparent) -->
  
  <!-- Text Styling: MAGIYA (Geometric Bold) -->
  <g fill="black" font-family="Arial, sans-serif" font-weight="900" font-size="60">
    
    <!-- M -->
    <text x="20" y="80">M</text>
    
    <!-- A with Walking Man Icon -->
    <g transform="translate(75, 30)">
      <path d="M0 50 L25 0 L50 50 Z" fill="black"/>
      <!-- Inner Walking Person Placeholder (White) -->
      <circle cx="25" cy="20" r="4" fill="white"/>
      <path d="M22 25 L28 25 L30 35 L20 35 Z" fill="white"/>
      <rect x="18" y="30" width="4" height="6" fill="white"/> <!-- Suitcase -->
    </g>
    
    <!-- G -->
    <text x="135" y="80">G</text>
    
    <!-- I as Blue Location Pin -->
    <g transform="translate(185, 35)">
      <path d="M12 0 C5 0 0 5 0 12 C0 20 12 35 12 35 C12 35 24 20 24 12 C24 5 19 0 12 0 Z" fill="#007BFF"/>
      <circle cx="12" cy="12" r="4" fill="white"/>
    </g>
    
    <!-- Y -->
    <text x="220" y="80">Y</text>
    
    <!-- A with Bus Icon -->
    <g transform="translate(270, 30)">
      <path d="M0 50 L25 0 L50 50 Z" fill="black"/>
      <!-- Inner Bus Placeholder (White) -->
      <rect x="15" y="25" width="20" height="15" rx="2" fill="white"/>
      <rect x="18" y="28" width="6" height="4" fill="black"/> <!-- Window -->
      <circle cx="20" cy="42" r="3" fill="white"/> <!-- Wheel -->
      <circle cx="30" cy="42" r="3" fill="white"/> <!-- Wheel -->
    </g>
    
    <!-- Registered Mark -->
    <text x="325" y="45" font-size="15">®</text>
  </g>
</svg>